- name: "set up PrairieLearn"
  become_user: "hacc"
  become: true
  block:
  - name: "Pull docker PrairieLearn image"
    community.docker.docker_image_pull:
      pull: "not_present"
      name: "prairielearn/prairielearn:latest"
    notify: "prune docker"

  - name: "copy PrairieLearn configuration"
    ansible.builtin.template:
      src: "config.json.j2"
      dest: "/var/www/hacc/config.json"

  - name: "Start docker container"
    community.docker.docker_container:
      name: "prairielearn"
      image: "prairielearn/prairielearn:latest"
      published_ports:
        - "{{ prairielearn_port }}:3000"
      volumes:
        - "/var/www/hacc/config.json:/PrairieLearn/config.json"
