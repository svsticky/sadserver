---
- name: "create user for hacc"
  ansible.builtin.user:
    name: "hacc"
    home: "/var/www/hacc"
    shell: "/usr/sbin/nologin"
    state: "present"
    system: true
    groups: "docker"
    append: true

- name: "copy ctf nginx configuration"
  ansible.builtin.template:
    src: "ctf.conf.j2"
    dest: "/etc/nginx/sites-available/ctf.hacc.{{ canonical_hostname }}.conf"
  notify: "reload nginx"

- name: "enable ctf nginx configuration"
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/ctf.hacc.{{ canonical_hostname }}.conf"
    path: "/etc/nginx/sites-enabled/ctf.hacc.{{ canonical_hostname }}.conf"
    state: "link"
  notify: "reload nginx"

- name: "copy prairielearn nginx configuration"
  ansible.builtin.template:
    src: "pl.conf.j2"
    dest: "/etc/nginx/sites-available/pl.hacc.{{ canonical_hostname }}.conf"
  notify: "reload nginx"

- name: "enable prairielearn nginx configuration"
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/pl.hacc.{{ canonical_hostname }}.conf"
    path: "/etc/nginx/sites-enabled/pl.hacc.{{ canonical_hostname }}.conf"
    state: "link"
  notify: "reload nginx"

