---
- name: "create user"
  ansible.builtin.user:
    name: "committeeclash"
    home: "/var/www/committeeclash"
    shell: "/usr/sbin/nologin"
    state: "present"
    system: true
    groups: "docker"

- name: "Do database setup"
  become_user: "postgres"
  become: true
  block:
  - name: "Ensure role exists"
    community.postgresql.postgresql_user:
      name: "committeeclash"
      password: "{{ secret_committeeclash.postgres_password }}"
      state: "present"

  - name: "Ensure database exists"
    community.postgresql.postgresql_db:
      name: "committeeclash"
      owner: "committeeclash"
      state: "present"

  - name: "Specify password authentication method over sockets for this container"
    notify: "restart postgres" # Apply changes
    become_user: "postgres"
    become: true
    community.postgresql.postgresql_pg_hba:
      dest: "{{ postgres.pg_hba_path }}"
      backup: "true"
      backup_file: "{{ postgres.pg_hba_path }}.old"

      # TYPE  DATABASE       USER            ADDR  METHOD
      # local committeeclash committeeclash        md5
      contype: "local"
      databases: "committeeclash"
      users: "committeeclash"
      method: "md5" # TODO use scram-sha-256 which is way safer

- name: "set up committeeclash"
  become_user: "committeeclash"
  become: true
  block:
  - name: "clone repository"
    ansible.builtin.git:
      repo: "https://github.com/svsticky/CommitteeClash.git"
      dest: "{{ committeeclash_project_source }}"
      depth: 1
      version: "{% if 'production' in group_names %}main{% else %}development{% endif %}" # Pull main when deploying to prod
    diff: false
    notify: "trigger committeeclash migration"

  - name: "Copy .env file"
    ansible.builtin.template:
      src: ".env.j2"
      dest: "{{ committeeclash_project_source }}/.env"
    diff: false
    notify: "trigger committeeclash migration"

  - name: "set up OAuth secret file"
    ansible.builtin.template:
      src: "oauth_client_secret.secret.j2"
      dest: "{{ committeeclash_project_source }}/oauth_client_secret.secret"
    diff: false

  - name: "set up Postgres secret files"
    ansible.builtin.template:
      src: "postgres_password.secret.j2"
      dest: "{{ committeeclash_project_source }}/postgres_password.secret"
    diff: false

  - name: "Check if migration must be triggered"
    ansible.builtin.meta: "flush_handlers"

  - name: "Check if migration has been triggered"
    ansible.builtin.stat:
      path: "{{ committeeclash_home_dir }}/.MIGRATION_PENDING"
      get_checksum: "no"
      get_attributes: "no"
      get_mime: "no"
    register: "committeeclash_update_marker"
    changed_when: "committeeclash_update_marker.stat.exists"
    notify: "backup committeeclash"

  - name: "Start handeling migration if needed"
    ansible.builtin.meta: "flush_handlers"

  - name: "Remove migration marker"
    ansible.builtin.file:
      path: "{{ committeeclash_home_dir }}/.MIGRATION_PENDING"
      state: "absent"

  - name: "Docker compose"
    ansible.builtin.include_tasks: "../docker/tasks/compose-up.yml"
    vars:
      project_source: "{{ committeeclash_project_source }}"
      remove_images: all
      compose_file: "docker-compose.prod.yml"

- name: "Copy nginx configuration"
  ansible.builtin.template:
    src: "committeeclash.conf.j2"
    dest: "/etc/nginx/sites-available/{{ item.cert_name }}.conf"
  loop:
    - server_names:
        - "committeeclash.{{ canonical_hostname }}"
        - "commissiestrijd.{{ canonical_hostname }}"
      cert_name: "committeeclash.{{ canonical_hostname }}"
      port: "{{ committeeclash_port }}"
    - server_names:
        - "docs.committeeclash.{{ canonical_hostname }}"
      cert_name: "docs.committeeclash.{{ canonical_hostname }}"
      port: "{{ committeeclash_docs_port }}"
  notify: "reload nginx"

- name: "Enable nginx configurations for committeeclash (main + docs)"
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.cert_name }}.conf"
    path: "/etc/nginx/sites-enabled/{{ item.cert_name }}.conf"
    state: link
  loop:
    - server_names:
        - "committeeclash.{{ canonical_hostname }}"
        - "commissiestrijd.{{ canonical_hostname }}"
      cert_name: "committeeclash.{{ canonical_hostname }}"
      port: "{{ committeeclash_port }}"
    - server_names:
        - "docs.committeeclash.{{ canonical_hostname }}"
      cert_name: "docs.committeeclash.{{ canonical_hostname }}"
      port: "{{ committeeclash_docs_port }}"
  notify: "reload nginx"
