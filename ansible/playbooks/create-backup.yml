---
- hosts: "all"
  user: "ansible"
  become: true
  become_user: "root"
  become_method: "sudo"
  force_handlers: true

  vars_prompt:
    - name: "backup_sources"
      default: "NONE"
      private: false
      prompt:
        "Enter the comma-delimited source(s) you want to back up
        (possibilities: admins/websites/postgres/contentful)"

  tasks:
    - name: "assert that input has been entered"
      assert:
        that: "backup_sources != 'NONE'"
    - name: "start backup of requested source(s)"
      # Pipe to a file to be able to read stdout during ansible run
      command: "/usr/local/bin/backup-to-s3.sh {{ item | quote }} >> /var/manual_{{ now(utc=true,fmt='%Y-%m-%d-%H:%M:%S' }}_backup.log"
      with_items: "{{ backup_sources.split(',') }}"
